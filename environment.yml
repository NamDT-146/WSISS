# Conda environment for WSSIS (remote GPU machine)
# Create:  bash scripts/setup/00_create_conda_env.sh
# Activate: conda activate wssis

name: wssis
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24
  - scipy
  - pyyaml
  - matplotlib
  - pandas
  # PyTorch (adjust cuda version to match your driver)
  - pytorch>=2.1
  - torchvision>=0.16
  - pytorch-cuda=11.8
  - pip:
    - -r requirements.txt
