model:
  img_size: 224
  backbone: resnet50
  pretrained: true
  freeze_backbone: false
  
  # GNN Stage configurations
  stage1:
    num_nodes: 49  # 7x7
    in_dim: 2048
    hidden_dim: 512
    out_dim: 512
    connectivity: "full"  # fully connected
    
  stage2:
    num_nodes: 784  # 28x28
    in_dim: 512
    hidden_dim: 256
    out_dim: 256
    connectivity: "local"
    k_neighbors: 8
    
  stage3:
    num_nodes: 12544  # 112x112
    in_dim: 64
    hidden_dim: 64
    out_dim: 64
    connectivity: "grid"
    kernel_size: 3

data:
  root: "./data"
  num_workers: 4
  
weak_signal:
  # Unified generator for training (samples across all corruption levels)
  unified:
    good_mask_prob: 0.25        # 25% good masks (IoU ~80-90%)
    poor_mask_prob: 0.25         # 25% poor masks (IoU ~60-80%)
    very_poor_mask_prob: 0.25    # 25% very poor masks (IoU ~40-60%)
    box_prob: 0.15               # 15% bounding boxes
    point_prob: 0.10             # 10% point supervision
  
  # Type-specific generators for evaluation
  good_mask:
    erosion_range: [1, 3]
    dilation_range: [1, 3]
    noise_prob: 0.1
  
  poor_mask:
    erosion_range: [3, 7]
    dilation_range: [3, 7]
    dropout_prob: 0.3
    noise_prob: 0.3
  
  box:
    expansion_ratio: [0.0, 0.2]
  
  point:
    num_points: [1, 3]
    sigma: 5.0

training:
  batch_size: 8
  epochs: 50
  lr: 1e-4
  weight_decay: 1e-4
  scheduler: "cosine"
  
  # Loss weights
  bce_weight: 1.0
  dice_weight: 1.0
  
  # Checkpointing
  save_freq: 10
  checkpoint_dir: "./checkpoints"

evaluation:
  output_dir: "./results"